<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verbarium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
  </head>
  <body>

    <header class="vb-header">
      <div class="vb-title">Ver<span>barium</span></div>
      <div class="vb-subtitle">A personal lexicon &nbsp;&middot;&nbsp; Emma Darling &nbsp;&middot;&nbsp; MMXXVI</div>
    </header>

    <nav class="vb-controls">
      <input class="vb-search" type="text" placeholder="Search words..." id="search">
      <button class="vb-filter active" data-filter="all">All volumes</button>
      <button class="vb-filter" data-filter="I">Vol. I</button>
      <button class="vb-filter" data-filter="II">Vol. II</button>
      <button class="vb-filter" data-filter="Feelings">Feelings</button>
      <button class="vb-filter" data-filter="Digital">Digital</button>
      <button class="vb-filter" data-filter="Social">Social</button>
      <button class="vb-filter" data-filter="Work">Work</button>
      <button class="vb-filter" data-filter="Dating">Dating</button>
      <button class="vb-filter" data-filter="Parenting">Parenting</button>
    </nav>

    <div id="expanded-area"></div>

    <main class="vb-grid" id="grid"></main>

    <footer class="vb-footer">
      Vol. I &middot; Ten coinages for the present age &nbsp;&middot;&nbsp;
      Vol. II &middot; Thirty coinages for love, family &amp; company
    </footer>

    <script src="script.js"></script>

  </body>
</html>
